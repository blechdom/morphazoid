<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hypercube-line { stroke: #8b5cf6; stroke-width: 1.2; fill: none; }
      .hypercube-node { fill: #8b5cf6; }
    </style>
  </defs>

  <!-- Outer cube edges -->
  <line x1="16" y1="16" x2="48" y2="16" class="hypercube-line"/>
  <line x1="48" y1="16" x2="48" y2="48" class="hypercube-line"/>
  <line x1="48" y1="48" x2="16" y2="48" class="hypercube-line"/>
  <line x1="16" y1="48" x2="16" y2="16" class="hypercube-line"/>

  <!-- Inner cube edges -->
  <line x1="24" y1="24" x2="40" y2="24" class="hypercube-line"/>
  <line x1="40" y1="24" x2="40" y2="40" class="hypercube-line"/>
  <line x1="40" y1="40" x2="24" y2="40" class="hypercube-line"/>
  <line x1="24" y1="40" x2="24" y2="24" class="hypercube-line"/>

  <!-- Connecting edges (4th dimension) -->
  <line x1="16" y1="16" x2="24" y2="24" class="hypercube-line"/>
  <line x1="48" y1="16" x2="40" y2="24" class="hypercube-line"/>
  <line x1="48" y1="48" x2="40" y2="40" class="hypercube-line"/>
  <line x1="16" y1="48" x2="24" y2="40" class="hypercube-line"/>

  <!-- Outer cube vertices -->
  <circle cx="16" cy="16" r="1.5" class="hypercube-node"/>
  <circle cx="48" cy="16" r="1.5" class="hypercube-node"/>
  <circle cx="48" cy="48" r="1.5" class="hypercube-node"/>
  <circle cx="16" cy="48" r="1.5" class="hypercube-node"/>

  <!-- Inner cube vertices -->
  <circle cx="24" cy="24" r="1.5" class="hypercube-node"/>
  <circle cx="40" cy="24" r="1.5" class="hypercube-node"/>
  <circle cx="40" cy="40" r="1.5" class="hypercube-node"/>
  <circle cx="24" cy="40" r="1.5" class="hypercube-node"/>
</svg>