<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07090b" />
    <meta name="description" content="Morphazoid Solid — a 3D wireframe intersection instrument." />
    <title>Solid — Morphazoid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="solid-page">
    <header class="masthead">
      <a class="wordmark" href="#solid" aria-label="Morphazoid Solid">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
        <span>morphazoid</span>
      </a>
      <nav class="tabs" aria-label="Instrument">
        <a class="tab" href="./">shape</a>
        <a class="tab" href="lattice.html">lattice</a>
        <a class="tab active" href="solid.html" aria-current="page">solid</a>
        <a class="tab" href="hyper.html">hyper</a>
        <a class="tab" href="lumber.html">lumber</a>
      </nav>
      <label class="mobile-instrument-nav">
        <span class="sr-only">Instrument</span>
        <select class="mobile-instrument-select" aria-label="Instrument">
          <option value="./">shape</option>
          <option value="lattice.html">lattice</option>
          <option value="solid.html" selected>solid</option>
          <option value="hyper.html">hyper</option>
          <option value="lumber.html">lumber</option>
        </select>
      </label>
      <div class="audio-strip" aria-label="Audio controls">
        <button class="audio-button" id="audioButton" type="button" aria-pressed="false">
          <span class="audio-glyph" aria-hidden="true">◉</span>
          <span class="audio-copy"><b>Audio</b><small id="audioState">off</small></span>
        </button>
        <label class="header-level" for="level">
          <span><b>Volume</b><output id="levelOut" for="level">65%</output></span>
          <input id="level" type="range" min="0" max="1" step="0.01" value="0.65" />
        </label>
      </div>
    </header>

    <main class="shell" id="solid">
      <section class="stage" aria-label="Solid stage">
        <div class="stage-wrap" id="stageWrap">
          <canvas id="stage" tabindex="0" aria-label="Drag to rotate the selected 3D shape or surface.">
            A projected 3D wireframe and its plane intersections.
          </canvas>
          <div class="solid-target-switch" role="group" aria-label="3D rotation target">
            <button id="selectSolid" type="button" aria-pressed="true">Shape</button>
            <button id="selectSurface" type="button" aria-pressed="false">Surface</button>
          </div>
          <div class="stage-meta" aria-hidden="true"><span id="stageReadout">CUBE · 0 CONTACTS · AUDIO OFF</span></div>
        </div>
      </section>

      <aside class="panel" aria-label="Solid controls">
        <details class="group control-section" data-section="play">
          <summary class="group-summary"><h2 class="group-title">Play</h2><span class="section-state" id="playSummary">plane · paused</span></summary>
          <div class="group-body">
            <div class="position-row">
              <button class="play-button" id="playButton" type="button" aria-pressed="false" aria-label="Play surface">
                <svg class="transport-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5 18 12 8 18.5Z" /></svg>
                <svg class="transport-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6v12M16 6v12" /></svg>
              </button>
              <label class="control position-control" for="position">
                <span><b>Surface position</b><output id="positionOut" for="position">0.0%</output></span>
                <input id="position" type="range" min="0" max="1" step="0.001" value="0.5" />
              </label>
            </div>
            <label class="control" for="speed"><span><b>Surface speed</b><output id="speedOut" for="speed">0.12 cyc/s</output></span><input id="speed" type="range" min="0.01" max="2" step="0.01" value="0.12" /></label>
            <button class="mini-action direction-action" id="directionButton" type="button">Direction · forward</button>
            <div class="axis-control-group">
              <label class="control" for="planeYaw"><span><b>Surface yaw</b><output id="planeYawOut" for="planeYaw">45°</output></span><input id="planeYaw" type="range" min="-180" max="180" step="1" value="45" /></label>
              <div class="axis-motion-row"><button class="mini-action axis-play-button" id="planeYawPlay" type="button" aria-pressed="false" aria-label="Play surface yaw"><span aria-hidden="true">▶</span><small>Yaw</small></button><label class="control" for="planeYawSpeed"><span><b>Yaw speed</b><output id="planeYawSpeedOut" for="planeYawSpeed">+0.04 rev/s</output></span><input id="planeYawSpeed" type="range" min="-0.5" max="0.5" step="0.01" value="0.04" /></label></div>
            </div>
            <div class="axis-control-group">
              <label class="control" for="planePitch"><span><b>Surface pitch</b><output id="planePitchOut" for="planePitch">−22°</output></span><input id="planePitch" type="range" min="-180" max="180" step="1" value="-22" /></label>
              <div class="axis-motion-row"><button class="mini-action axis-play-button" id="planePitchPlay" type="button" aria-pressed="false" aria-label="Play surface pitch"><span aria-hidden="true">▶</span><small>Pitch</small></button><label class="control" for="planePitchSpeed"><span><b>Pitch speed</b><output id="planePitchSpeedOut" for="planePitchSpeed">+0.03 rev/s</output></span><input id="planePitchSpeed" type="range" min="-0.5" max="0.5" step="0.01" value="0.03" /></label></div>
            </div>
          </div>
        </details>

        <details class="group control-section" data-section="form">
          <summary class="group-summary"><h2 class="group-title">Form</h2><span class="section-state" id="formSummary">cube</span></summary>
          <div class="group-body">
            <label class="select-control" for="solidType"><span class="field-label">Wireframe solid</span><span class="select-shell"><select id="solidType"><option value="cube" selected>Cube</option><option value="pyramid">Pyramid</option><option value="octahedron">Octahedron</option><option value="prism">Triangular prism</option><option value="cone">Cone</option><option value="cylinder">Cylinder</option><option value="sphere">Sphere</option><option value="torus">Torus</option></select></span></label>
            <label class="control" for="formScaleX"><span><b>Width</b><output id="formScaleXOut" for="formScaleX">1.00×</output></span><input id="formScaleX" type="range" min="0.5" max="1.6" step="0.01" value="1" /></label>
            <label class="control" for="formScaleY"><span><b>Height</b><output id="formScaleYOut" for="formScaleY">1.00×</output></span><input id="formScaleY" type="range" min="0.5" max="1.6" step="0.01" value="1" /></label>
            <label class="control" for="formScaleZ"><span><b>Depth</b><output id="formScaleZOut" for="formScaleZ">1.00×</output></span><input id="formScaleZ" type="range" min="0.5" max="1.6" step="0.01" value="1" /></label>
            <label class="control" for="formSkewX"><span><b>X skew</b><output id="formSkewXOut" for="formSkewX">0%</output></span><input id="formSkewX" type="range" min="-0.7" max="0.7" step="0.01" value="0" /></label>
            <label class="control" for="formSkewZ"><span><b>Z skew</b><output id="formSkewZOut" for="formSkewZ">0%</output></span><input id="formSkewZ" type="range" min="-0.7" max="0.7" step="0.01" value="0" /></label>
            <button class="mini-action reset-form" id="resetSolidForm" type="button">Reset form</button>
          </div>
        </details>

        <details class="group control-section" data-section="rotation">
          <summary class="group-summary"><h2 class="group-title">Rotation</h2><span class="section-state" id="rotationSummary">paused</span></summary>
          <div class="group-body">
            <div class="axis-control-group"><label class="control" for="rotationX"><span><b>X rotation</b><output id="rotationXOut" for="rotationX">−24°</output></span><input id="rotationX" type="range" min="-180" max="180" step="1" value="-24" /></label><div class="axis-motion-row"><button class="mini-action axis-play-button" id="rotationXPlay" type="button" aria-pressed="false" aria-label="Play X rotation"><span aria-hidden="true">▶</span><small>X</small></button><label class="control" for="rotationXSpeed"><span><b>X speed</b><output id="rotationXSpeedOut" for="rotationXSpeed">+0.03 rev/s</output></span><input id="rotationXSpeed" type="range" min="-0.5" max="0.5" step="0.01" value="0.03" /></label></div></div>
            <div class="axis-control-group"><label class="control" for="rotationY"><span><b>Y rotation</b><output id="rotationYOut" for="rotationY">36°</output></span><input id="rotationY" type="range" min="-180" max="180" step="1" value="36" /></label><div class="axis-motion-row"><button class="mini-action axis-play-button" id="rotationYPlay" type="button" aria-pressed="false" aria-label="Play Y rotation"><span aria-hidden="true">▶</span><small>Y</small></button><label class="control" for="rotationYSpeed"><span><b>Y speed</b><output id="rotationYSpeedOut" for="rotationYSpeed">+0.08 rev/s</output></span><input id="rotationYSpeed" type="range" min="-0.5" max="0.5" step="0.01" value="0.08" /></label></div></div>
            <div class="axis-control-group"><label class="control" for="rotationZ"><span><b>Z rotation</b><output id="rotationZOut" for="rotationZ">8°</output></span><input id="rotationZ" type="range" min="-180" max="180" step="1" value="8" /></label><div class="axis-motion-row"><button class="mini-action axis-play-button" id="rotationZPlay" type="button" aria-pressed="false" aria-label="Play Z rotation"><span aria-hidden="true">▶</span><small>Z</small></button><label class="control" for="rotationZSpeed"><span><b>Z speed</b><output id="rotationZSpeedOut" for="rotationZSpeed">+0.02 rev/s</output></span><input id="rotationZSpeed" type="range" min="-0.5" max="0.5" step="0.01" value="0.02" /></label></div></div>
          </div>
        </details>

        <details class="group control-section" data-section="sound">
          <summary class="group-summary"><h2 class="group-title">Sound</h2><span class="section-state" id="soundSummary">SINE</span></summary>
          <div class="group-body">
            <label class="select-control" for="soundMode"><span class="field-label">Voice</span><span class="select-shell"><select id="soundMode"><option value="sine" selected>Sine · corner envelope</option><option value="fm">FM · intersection index</option><option value="percussion">Percussion · vertex strikes</option><option value="shepard">Shepard · surface cycle</option><option value="pm">PM · intersection phase</option></select></span></label>
            <label class="control" for="baseFrequency"><span><b>Base frequency</b><output id="baseFrequencyOut" for="baseFrequency">110 Hz</output></span><input id="baseFrequency" type="range" min="20" max="440" step="1" value="110" /></label>
            <label class="control" for="pitchRange"><span><b>Pitch range</b><output id="pitchRangeOut" for="pitchRange">3.00 oct</output></span><input id="pitchRange" type="range" min="0" max="6" step="0.05" value="3" /></label>
            <div class="synth-panel" id="fmControls" hidden><label class="control" for="fmIndex"><span><b>FM index</b><output id="fmIndexOut" for="fmIndex">3.00 max</output></span><input id="fmIndex" type="range" min="0" max="12" step="0.05" value="3" /></label><label class="control" for="fmRatio"><span><b>Modulator ratio</b><output id="fmRatioOut" for="fmRatio">2.00 : 1</output></span><input id="fmRatio" type="range" min="0.25" max="8" step="0.05" value="2" /></label></div>
            <p class="audio-error" id="audioError" role="alert" hidden></p>
          </div>
        </details>
        <div class="reset-all-row">
          <button class="reset-all-button" type="button" data-reset-all>Reset all parameters</button>
        </div>
      </aside>
      <p class="sr-only" id="liveStatus" aria-live="polite"></p>
    </main>
    <script type="module" src="nav.js"></script>
    <script type="module" src="solid-app.js"></script>
  </body>
</html>
